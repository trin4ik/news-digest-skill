# Настройки news-digest
# Редактируется вручную или скиллом. Комментарии документируют каждую секцию.

version: 2

# Состояние онбординга. Пока complete=false, скилл продолжает мастер
# с current_step вместо сбора новостей. Шаги:
# locale | timezone | output | templates | topics | first_run | feedback | done
init:
  complete: false
  current_step: locale

# Язык вывода (короткая форма BCP 47, например "en", "ru").
locale: en

# Часовой пояс IANA, например "Europe/Moscow", "America/Los_Angeles".
# Используется для рендера дат/времени и генерации имён слотов manual-HHMMSS.
timezone: UTC

# Настройки вывода. Язык вывода берётся из верхнеуровневого `locale`.
output:
  max_items_total: 10              # лимит элементов в дайджесте
  min_importance_default: important # базовый фильтр; темы могут переопределять
  telegram_style: compact          # compact | detailed (Telegram — основная цель доставки)

# Окна хранения.
retention:
  seen_days: 90                    # сколько хранить записи seen.jsonl; старее — удаляются в начале каждого прогона
  raw_cache_days: 14               # сколько хранить YYYY-MM-DD/raw/; старее — удаляются в начале каждого прогона
  feedback_compaction_months: 6    # как часто рассматривать компактификацию фидбека

# Политика источников.
source_policy:
  prefer_primary_sources: true
  allow_source_discovery: true
  allow_web_search: true
  allow_social_search_via_web: true
  blocked_sources: []              # глобальный блок-лист (домены/имена)

# Определения уровней важности. Редактирование меняет семантику ранжирования.
importance_levels:
  critical: релизы, breaking changes, проблемы безопасности, крупные изменения продукта/API/цен
  important: значимые запуски, бенчмарки, сдвиги экосистемы, заметные технические тексты, широко обсуждаемые находки сообщества
  interesting: полезное, но менее важное; включай только если есть место
  ignore: SEO-мусор, тонкие репосты, посты-слухи, общие листиклы

# Темы. Заполняются мастером. Схема каждой темы:
#
# - id: <slug, нижний регистр, без пробелов>
#   name: <человеко-читаемое>
#   enabled: true
#   priority: 50              # больше = больше места
#   min_importance: important
#   focus:                    # 2-5 коротких строк с описанием интереса пользователя
#     - "..."
#   search_queries:           # термины / имена / проекты для веб-поиска
#     - "..."
#   preferred_sources:        # обнаруживаются скиллом, редактируются пользователем
#     official: []
#     community: []
#     media: []
#     social: []
#   negative_examples: []     # чего избегать (например, "общие листиклы")
#   blocked_sources: []       # пер-темный блок-лист
#   boost_keywords: []        # заполняется компактификацией фидбека
#   penalty_keywords: []      # заполняется компактификацией фидбека
topics: []
